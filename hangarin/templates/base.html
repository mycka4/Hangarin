{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>{% block title %}Hangarin{% endblock %}</title>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no' name='viewport' />

    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts (CDN) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <a href="/">
                <i class="bi bi-check2-square"></i> Hangarin
            </a>
        </div>

        <div class="sidebar-user">
            <img src="https://ui-avatars.com/api/?name=Admin&background=6c63ff&color=fff&size=42" alt="profile">
            <div class="user-info">
                <h6>Admin</h6>
                <span>Administrator</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">Main Menu</div>
            <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="#" class="nav-link {% block nav_tasks %}{% endblock %}">
                <i class="bi bi-list-task"></i> Tasks
            </a>
            <a href="#" class="nav-link {% block nav_subtasks %}{% endblock %}">
                <i class="bi bi-diagram-3"></i> Subtasks
            </a>
            <a href="#" class="nav-link {% block nav_notes %}{% endblock %}">
                <i class="bi bi-sticky"></i> Notes
            </a>

            <div class="nav-label mt-2">Settings</div>
            <a href="#" class="nav-link {% block nav_categories %}{% endblock %}">
                <i class="bi bi-tag"></i> Categories
            </a>
            <a href="#" class="nav-link {% block nav_priorities %}{% endblock %}">
                <i class="bi bi-flag"></i> Priorities
            </a>
        </nav>
    </div>

    <!-- ===== TOP NAVBAR ===== -->
    <div class="top-navbar">
        <h5 class="page-title">{% block page_title %}Dashboard{% endblock %}</h5>
        <div class="nav-actions">
            <button class="icon-btn">
                <i class="bi bi-bell"></i>
                <span class="notif-dot"></span>
            </button>
            <button class="icon-btn">
                <i class="bi bi-gear"></i>
            </button>
            <div class="admin-profile">
                <img src="https://ui-avatars.com/api/?name=Admin&background=6c63ff&color=fff&size=36" alt="admin">
                <span>Admin</span>
            </div>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="main-footer">
        2024 &copy; Hangarin Task Manager. All rights reserved.
    </footer>

    <!-- Bootstrap JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>

</body>
</html>
