{% load socialaccount %} {% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Hangarin Login</title>

    <!-- Bootstrap + MDB + Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.2/mdb.min.css" />

<style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: "Segoe UI", sans-serif;

        background: linear-gradient(
            180deg,
            #F39F5A 0%,
            #AE445A 40%,
            #662549 70%,
            #451952 90%,
            #1D1A39 100%
        );
    }

    .auth-card {
        max-width: 600px;
        width: 100%;
        padding: 2rem;
        border-radius: 20px;

        background: #E8BCB9;
        box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    }

    .nav-pills .nav-link {
        color: #451952;
        font-weight: 600;
        border-radius: 12px;
    }

    .nav-pills .nav-link.active {
        background-color: #662549;
        color: #fff;
    }

    .form-outline .form-control {
        background-color: #fff;
        border-radius: 10px;
    }

    .form-outline .form-control:focus {
        border-color: #AE445A;
        box-shadow: 0 0 0 0.15rem rgba(174, 68, 90, 0.25);
    }

    .btn-primary {
        background-color: #AE445A;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-primary:hover {
        background-color: #662549;
    }

    .btn-floating {
        color: #451952;
        font-size: 18px;
    }

    .btn-floating:hover {
        color: #AE445A;
    }

    a {
        color: #451952;
        font-weight: 500;
    }

    a:hover {
        color: #AE445A;
    }
</style>
</head>
<body>
    <div class="auth-card">

        <!-- Pills navs -->
        <ul class="nav nav-pills nav-justified mb-3" id="ex1" role="tablist">
            <li class="nav-item" role="presentation">
                <a class="nav-link active" id="tab-login" data-mdb-pill-init href="#pills-login" role="tab" aria-controls="pills-login" aria-selected="true">Login</a>
            </li>
            <li class="nav-item" role="presentation">
                <a class="nav-link" id="tab-register" data-mdb-pill-init href="#pills-register" role="tab" aria-controls="pills-register" aria-selected="false">Register</a>
            </li>
        </ul>

        <!-- Pills content -->
        <div class="tab-content">

            <!-- Login tab -->
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel" aria-labelledby="tab-login">
                <form method="post" action="{% url 'account_login' %}">
                    {% csrf_token %}

                    <div class="text-center mb-3">
                        <p>Sign in with:</p>
                        <a href="{% provider_login_url 'google' %}" class="btn btn-link btn-floating mx-1">
                            <i class="fab fa-google"></i>
                        </a>
                        <a href="#" class="btn btn-link btn-floating mx-1">
                            <i class="fab fa-github"></i>
                        </a>
                    </div>

                    <p class="text-center">or:</p>

                    <!-- Username / Email -->
                    <div data-mdb-input-init class="form-outline mb-4">
                        <input type="text" name="login" id="id_login" class="form-control" required />
                        <label class="form-label" for="id_login">Email or Username</label>
                    </div>

                    <!-- Password -->
                    <div data-mdb-input-init class="form-outline mb-4">
                        <input type="password" name="password" id="id_password" class="form-control" required />
                        <label class="form-label" for="id_password">Password</label>
                    </div>

                    <!-- Remember me -->
                    <div class="row mb-4">
                        <div class="col-md-6 d-flex justify-content-center">
                            <div class="form-check mb-3 mb-md-0">
                                <input class="form-check-input" type="checkbox" id="loginCheck" checked />
                                <label class="form-check-label" for="loginCheck"> Remember me </label>
                            </div>
                        </div>
                        <div class="col-md-6 d-flex justify-content-center">
                            <a href="{% url 'account_reset_password' %}">Forgot password?</a>
                        </div>
                    </div>

                    {% if form.non_field_errors %}
                    <div class="alert alert-danger" role="alert">
                        {% for error in form.non_field_errors %}
                        <p{% if forloop.last %} class="mb-0"{% endif %}>{{ error }}</p>
                        {% endfor %}
                    </div>
                    {% endif %}

                    <!-- Submit button -->
                    <button type="submit" class="btn btn-primary btn-block mb-4">Sign in</button>
                </form>
            </div>

            <!-- Register tab -->
            <div class="tab-pane fade" id="pills-register" role="tabpanel" aria-labelledby="tab-register">
                <form method="post" action="{% url 'account_signup' %}">
                    {% csrf_token %}

                    <div class="text-center mb-3">
                        <p>Sign up with:</p>
                        <a href="{% provider_login_url 'google' %}" class="btn btn-link btn-floating mx-1">
                            <i class="fab fa-google"></i>
                        </a>
                        <a href="#" class="btn btn-link btn-floating mx-1">
                            <i class="fab fa-github"></i>
                        </a>
                    </div>

                    <p class="text-center">or:</p>

                    <!-- Username -->
                    <div data-mdb-input-init class="form-outline mb-4">
                        <input type="text" name="username" id="registerUsername" class="form-control" required />
                        <label class="form-label" for="registerUsername">Username</label>
                    </div>

                    <!-- Email -->
                    <div data-mdb-input-init class="form-outline mb-4">
                        <input type="email" name="email" id="registerEmail" class="form-control" required />
                        <label class="form-label" for="registerEmail">Email</label>
                    </div>

                    <!-- Password -->
                    <div data-mdb-input-init class="form-outline mb-4">
                        <input type="password" name="password1" id="registerPassword" class="form-control" required />
                        <label class="form-label" for="registerPassword">Password</label>
                    </div>

                    <!-- Confirm Password -->
                    <div data-mdb-input-init class="form-outline mb-4">
                        <input type="password" name="password2" id="registerRepeatPassword" class="form-control" required />
                        <label class="form-label" for="registerRepeatPassword">Repeat password</label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary btn-block mb-3">Register</button>
                </form>
            </div>

        </div>
        <!-- Pills content -->

    </div>

    <!-- MDB + Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.2/mdb.min.js"></script>
</body>
</html>
